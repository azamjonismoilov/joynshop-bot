<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🔴 Joynshop Live</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root{
  --o500:#FF6A1A; --o600:#E85D14;
  --r500:#EF4444; --r600:#DC2626;
  --n50:#FAFAFA; --n100:#F4F5F7; --n200:#E5E7EB;
  --n500:#6B7280; --n700:#374151; --n900:#111827;
  --w:#fff; --g500:#10B981;
  --rs:10px; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:#fff;font-size:14px;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}

.live-container{position:relative;height:100vh;width:100vw;background:#000;}

/* VIDEO */
.video-wrap{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;}
.video-wrap video{width:100%;height:100%;object-fit:cover;background:#000;}
.video-placeholder{color:var(--n500);font-size:14px;text-align:center;padding:20px;}

/* TOP BAR */
.top-bar{position:absolute;top:0;left:0;right:0;padding:12px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);z-index:10;}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--r500);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:800;text-transform:uppercase;}
.live-badge::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.3}}

.viewer-count{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.5);padding:5px 10px;border-radius:6px;font-size:12px;backdrop-filter:blur(8px);}

.timer{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.5);padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;backdrop-filter:blur(8px);}
.timer i{color:var(--o500);}

.close-btn{width:32px;height:32px;background:rgba(0,0,0,.5);border-radius:50%;border:none;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:pointer;}

/* PRODUCT CARD */
.product-overlay{position:absolute;left:12px;right:12px;bottom:80px;z-index:5;}

.product-card{background:rgba(0,0,0,.75);backdrop-filter:blur(20px);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.1);}

.shop-line{font-size:11px;color:var(--g500);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.product-name{font-size:16px;font-weight:700;margin-bottom:10px;line-height:1.3;}

.prices{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.price-live{font-size:22px;font-weight:800;color:var(--o500);}
.price-old{font-size:13px;color:#999;text-decoration:line-through;}
.discount-tag{background:var(--r500);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}

.group-progress{margin-top:8px;}
.group-row{display:flex;justify-content:space-between;font-size:11px;color:#bbb;margin-bottom:5px;}
.progress-bar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--o500),#FF8A4A);border-radius:3px;transition:width .3s;}

/* RECENT ACTIVITY */
.activity{position:absolute;left:12px;bottom:200px;max-width:240px;z-index:4;}
.activity-item{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);padding:6px 10px;border-radius:14px;font-size:11px;margin-bottom:5px;animation:slideIn .3s;}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

/* CHAT */
.chat-overlay{position:absolute;right:12px;bottom:200px;max-width:280px;z-index:4;max-height:200px;overflow:hidden;display:flex;flex-direction:column-reverse;gap:5px;pointer-events:none;}
.chat-msg{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);padding:6px 10px;border-radius:14px;font-size:12px;animation:slideIn .3s;}
.chat-user{font-weight:700;color:var(--o500);}

/* BOTTOM BAR */
.bottom-bar{position:absolute;left:0;right:0;bottom:0;padding:12px;background:linear-gradient(0deg,rgba(0,0,0,.85),rgba(0,0,0,.5),transparent);z-index:10;display:flex;gap:8px;align-items:center;padding-bottom:max(12px,env(safe-area-inset-bottom));}

.input-wrap{flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:10px 16px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(10px);}
.input-wrap input{flex:1;background:transparent;border:none;color:#fff;font-size:14px;font-family:inherit;outline:none;}
.input-wrap input::placeholder{color:rgba(255,255,255,.5);}

.send-btn{width:38px;height:38px;background:var(--o500);border:none;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.join-btn{padding:12px 22px;background:linear-gradient(135deg,var(--o500),var(--o600));border:none;color:#fff;font-weight:700;font-size:14px;border-radius:24px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 16px rgba(255,106,26,.4);}
.join-btn:hover{transform:translateY(-1px);}

/* LOADING */
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;z-index:100;background:#000;}

.error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:100;background:#000;padding:40px;text-align:center;}

/* ENDED OVERLAY */
.ended-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;padding:40px;text-align:center;}
.ended-overlay.show{display:flex;}
.ended-icon{font-size:60px;margin-bottom:20px;color:var(--o500);}
.ended-title{font-size:22px;font-weight:700;margin-bottom:10px;}
.ended-text{color:#bbb;font-size:14px;margin-bottom:30px;}

@media(max-width:380px){
  .product-name{font-size:14px;}
  .price-live{font-size:18px;}
}
</style>
</head>
<body>

<div class="live-container">
  <div class="loading" id="loading">⏳ Yuklanmoqda...</div>

  <div class="video-wrap" id="videoWrap" style="display:none">
    <video id="videoEl" autoplay loop muted playsinline></video>
  </div>

  <div class="top-bar" id="topBar" style="display:none">
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <div class="live-badge">LIVE</div>
      <div class="viewer-count" id="viewerCount">👀 0</div>
      <div class="timer" id="timer"><i class="ri-time-line"></i> --:--:--</div>
    </div>
    <button class="close-btn" onclick="window.close()">×</button>
  </div>

  <div class="chat-overlay" id="chatOverlay"></div>
  <div class="activity" id="activityFeed"></div>

  <div class="product-overlay" id="productOverlay" style="display:none">
    <div class="product-card">
      <div class="shop-line" id="shopLine">SHOP</div>
      <div class="product-name" id="productName">Mahsulot</div>
      <div class="prices">
        <div class="price-live" id="priceLive">0 so'm</div>
        <div class="price-old" id="priceOld" style="display:none">0 so'm</div>
        <div class="discount-tag" id="discountTag" style="display:none">-0%</div>
      </div>
      <div class="group-progress">
        <div class="group-row">
          <span id="groupLeft">Guruh: 0/0</span>
          <span id="groupRight" style="color:var(--o500);font-weight:700">Yana 0 kishi</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar" style="display:none">
    <div class="input-wrap">
      <input type="text" id="chatInput" placeholder="Savol bering..." maxlength="200">
      <button class="send-btn" onclick="sendQuestion()"><i class="ri-send-plane-fill"></i></button>
    </div>
    <button class="join-btn" onclick="joinGroup()">
      <i class="ri-shopping-bag-3-line"></i> Qo'shilish
    </button>
  </div>

  <div class="ended-overlay" id="endedOverlay">
    <div class="ended-icon">⏰</div>
    <div class="ended-title">Live tugadi</div>
    <div class="ended-text">Live narxi endi mavjud emas, lekin guruhga qo'shilishingiz mumkin oddiy guruh narxi bilan.</div>
    <button class="join-btn" onclick="joinGroup()">
      <i class="ri-shopping-bag-3-line"></i> Guruh narxda qo'shilish
    </button>
  </div>
</div>

<script>
const liveId = window.location.pathname.split('/').pop();
let liveData = null;
let lastQuestionCount = 0;
let timerInterval = null;
let viewSent = false;

function fmt(n){return new Intl.NumberFormat('en-US').format(n).replace(/,/g,' ');}

// Telegram WebApp init (agar ichida bo'lsa)
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if(tg){tg.expand();tg.ready();}

function getUser(){
  if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user){
    const u = tg.initDataUnsafe.user;
    return {
      id: u.id,
      name: [u.first_name, u.last_name].filter(Boolean).join(' ') || 'Mehmon'
    };
  }
  // Brauzerda — random
  let id = localStorage.getItem('joynshop_guest_id');
  if(!id){
    id = 'g' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('joynshop_guest_id', id);
  }
  return {id: id, name: 'Mehmon'};
}

async function loadLive(){
  try {
    const res = await fetch('/api/live/' + liveId);
    const d = await res.json();
    if(!d.ok){
      document.getElementById('loading').innerHTML = '<div class="error"><i class="ri-error-warning-line" style="font-size:50px;color:var(--o500);margin-bottom:20px"></i><div style="font-size:18px;font-weight:700;margin-bottom:10px">Live topilmadi</div><div style="color:#bbb">' + (d.error||'Xatolik') + '</div></div>';
      return;
    }
    liveData = d;
    render();
    sendView();
  } catch(e){
    document.getElementById('loading').innerHTML = '<div class="error">❌ Serverga ulanib bo\'lmadi</div>';
  }
}

function render(){
  const d = liveData;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('videoWrap').style.display = '';
  document.getElementById('topBar').style.display = '';
  document.getElementById('productOverlay').style.display = '';
  document.getElementById('bottomBar').style.display = '';

  // Video
  const video = document.getElementById('videoEl');
  if(d.video_url){
    video.src = d.video_url;
    video.play().catch(()=>{});
  } else {
    document.getElementById('videoWrap').innerHTML = '<div class="video-placeholder">📹 Video yuklanmadi</div>';
  }

  // Product info
  document.getElementById('shopLine').textContent = d.shop_name || 'Joynshop';
  document.getElementById('productName').textContent = d.product_name;
  document.getElementById('priceLive').textContent = fmt(d.live_price) + " so'm";

  if(d.group_price > d.live_price){
    document.getElementById('priceOld').textContent = fmt(d.group_price) + " so'm";
    document.getElementById('priceOld').style.display = '';
    document.getElementById('discountTag').textContent = '-' + d.discount_pct + '%';
    document.getElementById('discountTag').style.display = '';
  }

  // Group progress
  const pct = Math.min(100, Math.round(d.count / d.min_group * 100));
  document.getElementById('groupLeft').textContent = `Guruh: ${d.count}/${d.min_group}`;
  document.getElementById('groupRight').textContent = d.count >= d.min_group ? "✅ To'ldi!" : `Yana ${d.min_group - d.count} kishi`;
  document.getElementById('progressFill').style.width = pct + '%';

  // Viewer count
  document.getElementById('viewerCount').textContent = '👀 ' + d.viewer_count;

  // Timer
  startTimer(d.seconds_left);

  // Status
  if(d.status === 'ended' || d.seconds_left <= 0){
    document.getElementById('endedOverlay').classList.add('show');
  }

  // Render existing questions
  renderChat(d.questions || []);
}

function startTimer(seconds){
  if(timerInterval) clearInterval(timerInterval);
  let remaining = seconds;
  function tick(){
    if(remaining <= 0){
      document.getElementById('timer').innerHTML = '<i class="ri-time-line"></i> TUGADI';
      document.getElementById('endedOverlay').classList.add('show');
      clearInterval(timerInterval);
      return;
    }
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    document.getElementById('timer').innerHTML =
      `<i class="ri-time-line"></i> ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    remaining--;
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

async function sendView(){
  if(viewSent) return;
  viewSent = true;
  const user = getUser();
  try {
    await fetch('/api/live/' + liveId + '/view', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: user.id})
    });
  } catch(e){}
}

async function sendQuestion(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  const user = getUser();
  input.value = '';
  // Local ko'rinish
  addChatMsg(user.name, text);
  try {
    await fetch('/api/live/' + liveId + '/question', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_name: user.name, text: text})
    });
  } catch(e){}
}

function addChatMsg(user, text){
  const overlay = document.getElementById('chatOverlay');
  const msg = document.createElement('div');
  msg.className = 'chat-msg';
  msg.innerHTML = `<span class="chat-user">${user}:</span> ${text}`;
  overlay.insertBefore(msg, overlay.firstChild);
  // Eski xabarlarni o'chirish
  while(overlay.children.length > 5){
    overlay.removeChild(overlay.lastChild);
  }
}

function renderChat(questions){
  const overlay = document.getElementById('chatOverlay');
  overlay.innerHTML = '';
  questions.slice(-5).forEach(q => addChatMsg(q.user_name, q.text));
}

function joinGroup(){
  if(!liveData) return;
  const url = '/pay/' + liveData.product_id + '?type=group&live=' + liveId;
  window.location.href = url;
}

// Real-time poll har 5 sekundda
async function pollUpdates(){
  try {
    const res = await fetch('/api/live/' + liveId);
    const d = await res.json();
    if(!d.ok) return;
    const oldCount = liveData ? liveData.count : 0;
    const oldQuestions = liveData ? (liveData.questions||[]).length : 0;
    liveData = d;

    // Yangilanishlar
    document.getElementById('viewerCount').textContent = '👀 ' + d.viewer_count;
    const pct = Math.min(100, Math.round(d.count / d.min_group * 100));
    document.getElementById('groupLeft').textContent = `Guruh: ${d.count}/${d.min_group}`;
    document.getElementById('groupRight').textContent = d.count >= d.min_group ? "✅ To'ldi!" : `Yana ${d.min_group - d.count} kishi`;
    document.getElementById('progressFill').style.width = pct + '%';

    // Yangi qo'shilgan
    if(d.count > oldCount){
      addActivity(`🎉 Yangi qo'shilgan! (${d.count}/${d.min_group})`);
    }

    // Yangi savollar
    const questions = d.questions || [];
    if(questions.length > oldQuestions){
      const newOnes = questions.slice(oldQuestions);
      newOnes.forEach(q => addChatMsg(q.user_name, q.text));
    }

    // Status
    if(d.status === 'ended' || d.seconds_left <= 0){
      document.getElementById('endedOverlay').classList.add('show');
    }
  } catch(e){}
}

function addActivity(text){
  const feed = document.getElementById('activityFeed');
  const item = document.createElement('div');
  item.className = 'activity-item';
  item.textContent = text;
  feed.insertBefore(item, feed.firstChild);
  setTimeout(() => item.remove(), 5000);
  while(feed.children.length > 3){
    feed.removeChild(feed.lastChild);
  }
}

// Enter bilan savol yuborish
document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') sendQuestion();
});

loadLive();
setInterval(pollUpdates, 5000);
</script>
</body>
</html>
