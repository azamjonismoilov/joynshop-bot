<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joynshop — Investor Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E8E4DC;
    --text: #1A1814;
    --text2: #6B6560;
    --text3: #A09890;
    --accent: #2D6A4F;
    --accent2: #52B788;
    --accent-light: #D8F3DC;
    --red: #E63946;
    --red-light: #FFE8EA;
    --amber: #F4A261;
    --amber-light: #FFF0E0;
    --blue: #2B6CB0;
    --blue-light: #EBF4FF;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #F5F4F0 0%, #E8F5E9 100%);
  }

  .login-box {
    background: var(--surface);
    border-radius: 20px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .login-logo {
    width: 64px;
    height: 64px;
    background: var(--accent);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
  }

  .login-box h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
  }

  .login-box p {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .login-box input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    outline: none;
    background: var(--surface2);
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  .login-box input:focus { border-color: var(--accent); background: #fff; }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:hover { background: #235c42; }
  .login-btn:active { transform: scale(0.98); }

  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* DASHBOARD */
  #dashboard { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .topbar h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .lang-switch {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .lang-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .refresh-btn {
    padding: 8px 16px;
    background: var(--accent-light);
    color: var(--accent);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }

  .refresh-btn:hover { background: #c8ebcc; }

  .last-updated {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* MAIN */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    margin-top: 32px;
  }

  .section-title:first-child { margin-top: 0; }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    gap: 16px;
  }

  .cards-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .cards-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .cards-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--text2);
  }

  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-green { background: var(--accent-light); color: var(--accent); }
  .badge-red   { background: var(--red-light); color: var(--red); }
  .badge-amber { background: var(--amber-light); color: #c47a1e; }
  .badge-blue  { background: var(--blue-light); color: var(--blue); }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .icon-green { background: var(--accent-light); }
  .icon-blue  { background: var(--blue-light); }
  .icon-amber { background: var(--amber-light); }
  .icon-red   { background: var(--red-light); }

  /* HIGHLIGHT CARD */
  .card.highlight {
    background: var(--accent);
    color: white;
    border-color: transparent;
  }

  .card.highlight .card-label { color: rgba(255,255,255,0.7); }
  .card.highlight .card-sub   { color: rgba(255,255,255,0.8); }
  .card.highlight .card-value { color: white; }

  /* CHART CARD */
  .chart-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .chart-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .chart-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .chart-subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
  }

  .chart-container { position: relative; height: 260px; }

  /* PROGRESS BAR */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .progress-row:last-child { border-bottom: none; padding-bottom: 0; }
  .progress-row:first-child { padding-top: 0; }

  .progress-label {
    font-size: 13px;
    font-weight: 500;
    width: 140px;
    flex-shrink: 0;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 1s ease;
  }

  .progress-val {
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    width: 50px;
    text-align: right;
    flex-shrink: 0;
  }

  /* TABLE */
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 0 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 14px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .data-table tr:last-child td { border-bottom: none; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .fmt-money {
    font-family: 'DM Mono', monospace;
    font-weight: 600;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .cards-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
    .cards-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    .topbar { padding: 0 16px; }
    .main { padding: 20px 16px; }
    .cards-grid.cols-4,
    .cards-grid.cols-3,
    .cards-grid.cols-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏪</div>
    <h1>Joynshop Dashboard</h1>
    <p id="login-sub">Investor Panel · Kirish uchun parol yozing</p>
    <input type="password" id="pwd-input" placeholder="••••••••" />
    <button class="login-btn" onclick="doLogin()" id="login-btn">Kirish / Sign In</button>
    <div class="login-error" id="login-error">❌ Noto'g'ri parol / Wrong password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">🏪</div>
      <h1>Joynshop Dashboard</h1>
    </div>
    <div class="topbar-right">
      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('uz')" id="lang-uz">UZ</button>
        <button class="lang-btn" onclick="setLang('en')" id="lang-en">EN</button>
      </div>
      <button class="refresh-btn" onclick="loadData()">
        <span>↻</span> <span data-uz="Yangilash" data-en="Refresh">Yangilash</span>
      </button>
      <span class="last-updated" id="last-updated"></span>
    </div>
  </nav>

  <div class="main" id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      <span style="color:var(--text3);font-size:14px">Ma'lumotlar yuklanmoqda...</span>
    </div>
  </div>
</div>

<script>
let currentLang = 'uz';
let statsData = null;
let pwd = '';
let gmvChart = null;
let ordersChart = null;

const T = {
  uz: {
    kpi_title: 'Asosiy Ko\'rsatkichlar',
    sellers_title: 'Sotuvchilar',
    finance_title: 'Moliyaviy Ko\'rsatkichlar',
    funnel_title: 'Konversiya',
    chart_title: 'O\'sish Grafigi (14 kun)',
    chart_sub: 'Kunlik GMV va buyurtmalar',
    total_sellers: 'Jami sotuvchilar',
    channels: 'Tasdiqlangan kanallar',
    total_buyers: 'Jami xaridorlar',
    today_buyers: 'Bugun yangi xaridorlar',
    total_orders: 'Jami buyurtmalar',
    today_orders: 'Bugungi buyurtmalar',
    week_orders: 'Haftalik buyurtmalar',
    conversion: 'Konversiya',
    gmv_total: 'Jami GMV',
    gmv_today: 'Bugungi GMV',
    gmv_week: 'Haftalik GMV',
    commission: 'Joynshop daromadi (5%)',
    commission_week: 'Haftalik daromad',
    avg_order: "O'rtacha chek",
    active_products: 'Aktiv mahsulotlar',
    filled_groups: "To'lgan guruhlar",
    total_products: 'Jami e\'lonlar',
    fill_rate: "Guruh to'lish foizi",
    order_conv: 'Buyurtma → To\'lov',
    daily_active: 'Bugungi aktivlik',
    gmv_label: 'GMV (so\'m)',
    orders_label: 'Buyurtmalar',
  },
  en: {
    kpi_title: 'Key Metrics',
    sellers_title: 'Sellers',
    finance_title: 'Financial Metrics',
    funnel_title: 'Conversion Funnel',
    chart_title: 'Growth Chart (14 days)',
    chart_sub: 'Daily GMV and orders',
    total_sellers: 'Total sellers',
    channels: 'Verified channels',
    total_buyers: 'Total buyers',
    today_buyers: "Today's new buyers",
    total_orders: 'Total orders',
    today_orders: "Today's orders",
    week_orders: 'Weekly orders',
    conversion: 'Conversion rate',
    gmv_total: 'Total GMV',
    gmv_today: "Today's GMV",
    gmv_week: 'Weekly GMV',
    commission: 'Joynshop revenue (5%)',
    commission_week: 'Weekly revenue',
    avg_order: 'Average order value',
    active_products: 'Active products',
    filled_groups: 'Filled groups',
    total_products: 'Total listings',
    fill_rate: 'Group fill rate',
    order_conv: 'Order → Payment',
    daily_active: 'Daily activity',
    gmv_label: 'GMV (UZS)',
    orders_label: 'Orders',
  }
};

function t(key) { return T[currentLang][key] || key; }

function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-uz').classList.toggle('active', lang === 'uz');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('login-sub').textContent =
    lang === 'uz' ? 'Investor Panel · Kirish uchun parol yozing'
                  : 'Investor Panel · Enter password to continue';
  if (statsData) renderDashboard(statsData);
}

function fmtMoney(n) {
  if (n >= 1_000_000_000) return (n/1_000_000_000).toFixed(1) + ' mlrd';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + ' mln';
  if (n >= 1_000) return (n/1_000).toFixed(0) + 'K';
  return n.toString();
}

function fmtFull(n) {
  return n.toLocaleString('uz-UZ') + " so'm";
}

function doLogin() {
  pwd = document.getElementById('pwd-input').value;
  document.getElementById('login-btn').textContent = '...';
  fetch(`/api/stats?pwd=${encodeURIComponent(pwd)}`)
    .then(r => {
      if (!r.ok) throw new Error('wrong');
      return r.json();
    })
    .then(data => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      statsData = data;
      renderDashboard(data);
    })
    .catch(() => {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-btn').textContent = 'Kirish / Sign In';
    });
}

function loadData() {
  fetch(`/api/stats?pwd=${encodeURIComponent(pwd)}`)
    .then(r => r.json())
    .then(data => {
      statsData = data;
      renderDashboard(data);
    });
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function renderDashboard(d) {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    now.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  const html = `
    <!-- KPI -->
    <div class="section-title">${t('kpi_title')}</div>
    <div class="cards-grid cols-4">
      <div class="card highlight">
        <div class="card-icon icon-green" style="background:rgba(255,255,255,0.15)">💰</div>
        <div class="card-label">${t('gmv_total')}</div>
        <div class="card-value">${fmtMoney(d.finance.gmv_total)}</div>
        <div class="card-sub">${fmtFull(d.finance.gmv_total)}</div>
      </div>
      <div class="card">
        <div class="card-icon icon-green">📦</div>
        <div class="card-label">${t('total_orders')}</div>
        <div class="card-value">${d.orders.total.toLocaleString()}</div>
        <div class="card-sub">
          <span class="card-badge badge-green">+${d.orders.today} ${currentLang==='uz'?'bugun':'today'}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-icon icon-blue">👥</div>
        <div class="card-label">${t('total_buyers')}</div>
        <div class="card-value">${d.buyers.total.toLocaleString()}</div>
        <div class="card-sub">
          <span class="card-badge badge-blue">+${d.buyers.today} ${currentLang==='uz'?'bugun':'today'}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-icon icon-amber">📊</div>
        <div class="card-label">${t('commission')}</div>
        <div class="card-value">${fmtMoney(d.finance.commission_total)}</div>
        <div class="card-sub">${fmtFull(d.finance.commission_total)}</div>
      </div>
    </div>

    <!-- CHART -->
    <div class="section-title">${t('chart_title')}</div>
    <div class="chart-card">
      <div class="chart-header">
        <div>
          <div class="chart-title">${t('chart_title')}</div>
          <div class="chart-subtitle">${t('chart_sub')}</div>
        </div>
        <div style="display:flex;gap:16px;align-items:center">
          <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
            <div style="width:12px;height:12px;background:var(--accent);border-radius:3px"></div>
            ${t('gmv_label')}
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
            <div style="width:12px;height:12px;background:var(--amber);border-radius:3px"></div>
            ${t('orders_label')}
          </div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="gmvChart"></canvas>
      </div>
    </div>

    <!-- FINANCE + SELLERS -->
    <div class="cards-grid cols-2" style="margin-top:24px">
      <!-- Finance -->
      <div class="card">
        <div class="section-title" style="margin-top:0">${t('finance_title')}</div>
        <div class="progress-row">
          <div class="progress-label">${t('gmv_today')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.finance.gmv_total?Math.min(100,d.finance.gmv_today/d.finance.gmv_total*100*20):0}%"></div>
          </div>
          <div class="progress-val fmt-money">${fmtMoney(d.finance.gmv_today)}</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${t('gmv_week')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.finance.gmv_total?Math.min(100,d.finance.gmv_week/d.finance.gmv_total*100*2):0}%;background:var(--amber)"></div>
          </div>
          <div class="progress-val fmt-money">${fmtMoney(d.finance.gmv_week)}</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${t('avg_order')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:60%;background:var(--blue)"></div>
          </div>
          <div class="progress-val fmt-money">${fmtMoney(d.finance.avg_order)}</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${t('commission_week')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.finance.commission_total?Math.min(100,d.finance.commission_week/d.finance.commission_total*100*2):0}%;background:#9b59b6"></div>
          </div>
          <div class="progress-val fmt-money">${fmtMoney(d.finance.commission_week)}</div>
        </div>
      </div>

      <!-- Conversion -->
      <div class="card">
        <div class="section-title" style="margin-top:0">${t('funnel_title')}</div>
        <div class="progress-row">
          <div class="progress-label">${t('fill_rate')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.products.total?(d.products.filled/d.products.total*100):0}%"></div>
          </div>
          <div class="progress-val">${d.products.total?Math.round(d.products.filled/d.products.total*100):0}%</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${t('order_conv')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.orders.conversion}%;background:var(--amber)"></div>
          </div>
          <div class="progress-val">${d.orders.conversion}%</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${t('week_orders')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.orders.total?Math.min(100,d.orders.week/d.orders.total*100*4):0}%;background:var(--blue)"></div>
          </div>
          <div class="progress-val">${d.orders.week}</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">${t('today_orders')}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${d.orders.week?Math.min(100,d.orders.today/d.orders.week*100*7):0}%;background:#9b59b6"></div>
          </div>
          <div class="progress-val">${d.orders.today}</div>
        </div>
      </div>
    </div>

    <!-- BOTTOM STATS -->
    <div class="cards-grid cols-4" style="margin-top:16px">
      <div class="card">
        <div class="card-label">🏪 ${t('total_sellers')}</div>
        <div class="card-value" style="font-size:28px">${d.sellers.total}</div>
        <div class="card-sub">${d.sellers.channels} ${t('channels')}</div>
      </div>
      <div class="card">
        <div class="card-label">📢 ${t('active_products')}</div>
        <div class="card-value" style="font-size:28px">${d.products.active}</div>
        <div class="card-sub">${t('total_products')}: ${d.products.total}</div>
      </div>
      <div class="card">
        <div class="card-label">✅ ${t('filled_groups')}</div>
        <div class="card-value" style="font-size:28px">${d.products.filled}</div>
        <div class="card-sub"><span class="card-badge badge-green">${d.products.total?Math.round(d.products.filled/d.products.total*100):0}%</span></div>
      </div>
      <div class="card">
        <div class="card-label">💎 ${t('commission')}</div>
        <div class="card-value" style="font-size:28px">${fmtMoney(d.finance.commission_total)}</div>
        <div class="card-sub">${currentLang==='uz'?'Haftalik':'Weekly'}: ${fmtMoney(d.finance.commission_week)}</div>
      </div>
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
  renderChart(d.chart);

  // Kanallar ro'yxati
  const channelList = d.sellers.channel_list || [];
  if (channelList.length > 0) {
    const channelHtml = `
      <div class="section-title" style="margin-top:32px">${currentLang==='uz' ? 'Faol kanallar' : 'Active Channels'}</div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="data-table" style="padding:0">
          <thead>
            <tr>
              <th style="padding:16px 24px 12px">${currentLang==='uz'?'Kanal':'Channel'}</th>
              <th style="padding:16px 24px 12px">${currentLang==='uz'?'Aktiv mahsulot':'Active products'}</th>
              <th style="padding:16px 24px 12px">${currentLang==='uz'?'Moderatorlar':'Moderators'}</th>
              <th style="padding:16px 24px 12px">${currentLang==='uz'?'Egasi ID':'Owner ID'}</th>
            </tr>
          </thead>
          <tbody>
            ${channelList.map(ch => `
              <tr>
                <td style="padding:14px 24px">
                  <a href="https://t.me/${ch.username.replace('@','')}" target="_blank"
                     style="color:var(--accent);font-weight:600;text-decoration:none">
                    ${ch.username}
                  </a>
                </td>
                <td style="padding:14px 24px">
                  <span style="background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">
                    ${ch.products}
                  </span>
                </td>
                <td style="padding:14px 24px;color:var(--text2)">${ch.mods}</td>
                <td style="padding:14px 24px">
                  <code style="font-size:12px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:6px">${ch.owner}</code>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
    document.getElementById('main-content').innerHTML += channelHtml;
  }
}

function renderChart(chartData) {
  const ctx = document.getElementById('gmvChart');
  if (!ctx) return;
  if (gmvChart) gmvChart.destroy();

  const labels = chartData.map(d => d.date);
  const gmvData = chartData.map(d => d.gmv);
  const ordersData = chartData.map(d => d.orders);

  gmvChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: t('gmv_label'),
          data: gmvData,
          backgroundColor: 'rgba(45, 106, 79, 0.15)',
          borderColor: 'rgba(45, 106, 79, 0.8)',
          borderWidth: 2,
          borderRadius: 6,
          yAxisID: 'y',
        },
        {
          label: t('orders_label'),
          data: ordersData,
          type: 'line',
          borderColor: '#F4A261',
          backgroundColor: 'rgba(244, 162, 97, 0.1)',
          borderWidth: 2.5,
          pointBackgroundColor: '#F4A261',
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          tension: 0.4,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1A1814',
          titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.8)',
          padding: 12,
          cornerRadius: 10,
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 0)
                return ` GMV: ${ctx.raw.toLocaleString()} so'm`;
              return ` ${t('orders_label')}: ${ctx.raw}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: 'DM Mono', size: 11 }, color: '#A09890' }
        },
        y: {
          position: 'left',
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { family: 'DM Mono', size: 11 },
            color: '#A09890',
            callback: v => fmtMoney(v)
          }
        },
        y2: {
          position: 'right',
          grid: { display: false },
          ticks: {
            font: { family: 'DM Mono', size: 11 },
            color: '#F4A261',
          }
        }
      }
    }
  });
}
</script>
</body>
</html>
