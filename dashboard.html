<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joynshop Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#F5F4F0;--surface:#fff;--surface2:#F0EDE8;--border:#E8E4DC;
  --text:#1A1814;--text2:#6B6560;--text3:#A09890;
  --accent:#2D6A4F;--accent2:#52B788;--accent-light:#D8F3DC;
  --red:#E63946;--red-light:#FFE8EA;--amber:#F4A261;--amber-light:#FFF0E0;
  --blue:#2B6CB0;--blue-light:#EBF4FF;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.08);
  --sidebar:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#F5F4F0,#E8F5E9);}
.login-box{background:var(--surface);border-radius:20px;padding:48px 40px;width:380px;box-shadow:var(--shadow-lg);text-align:center;}
.login-logo{width:64px;height:64px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px;}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:6px;}
.login-box p{color:var(--text2);font-size:14px;margin-bottom:28px;}
.login-box input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Mono',monospace;font-size:15px;outline:none;background:var(--surface2);transition:border-color .2s;margin-bottom:12px;}
.login-box input:focus{border-color:var(--accent);background:#fff;}
.login-btn{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:#235c42;}
.login-error{color:var(--red);font-size:13px;margin-top:10px;display:none;}

/* LAYOUT */
#app{display:none;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px 0 0;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topbar-left{display:flex;align-items:center;gap:0;height:100%;}
.sidebar-toggle{width:60px;height:60px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;font-size:20px;color:var(--text2);transition:background .15s;flex-shrink:0;}
.sidebar-toggle:hover{background:var(--surface2);}
.topbar-brand{display:flex;align-items:center;gap:10px;padding-left:4px;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.topbar h1{font-size:16px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.refresh-btn{padding:7px 14px;background:var(--accent-light);color:var(--accent);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.refresh-btn:hover{background:#c8ebcc;}
.last-updated{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.logout-btn{padding:7px 14px;background:var(--surface2);color:var(--text2);border:none;border-radius:8px;font-size:13px;cursor:pointer;}
.logout-btn:hover{background:var(--red-light);color:var(--red);}

/* SIDEBAR */
.layout{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;transition:width .25s ease,opacity .25s;overflow:hidden;}
.sidebar.collapsed{width:0;opacity:0;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text2);width:100%;text-align:left;transition:all .15s;white-space:nowrap;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);}
.nav-icon{font-size:18px;flex-shrink:0;width:22px;text-align:center;}
.nav-divider{height:1px;background:var(--border);margin:8px 8px;}
.nav-section{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:8px 20px 4px;}

/* CONTENT */
.content{flex:1;overflow-x:hidden;}
.page{display:none;padding:28px 28px;}
.page.active{display:block;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}

/* CARDS */
.cards-grid{display:grid;gap:14px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.card{background:var(--surface);border-radius:14px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);}
.card.highlight{background:var(--accent);color:white;border-color:transparent;}
.card.highlight .card-label{color:rgba(255,255,255,.7);}
.card.highlight .card-sub{color:rgba(255,255,255,.8);}
.card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;}
.icon-green{background:var(--accent-light);}
.icon-blue{background:var(--blue-light);}
.icon-amber{background:var(--amber-light);}
.icon-red{background:var(--red-light);}
.card-label{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:6px;}
.card-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--text2);}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-green{background:var(--accent-light);color:var(--accent);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-amber{background:var(--amber-light);color:#c47a1e;}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-gray{background:var(--surface2);color:var(--text2);}

/* TABLE */
.table-wrap{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
thead th{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
tbody td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);}
.pagination{display:flex;gap:4px;}
.page-btn{padding:6px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);}
.page-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-btn.active{background:var(--accent);color:white;border-color:var(--accent);}

/* CHART */
.chart-card{background:var(--surface);border-radius:14px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.chart-title{font-size:15px;font-weight:700;}
.chart-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.chart-container{position:relative;height:240px;}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.progress-row:last-child{border-bottom:none;padding-bottom:0;}
.progress-row:first-child{padding-top:0;}
.progress-label{font-size:13px;font-weight:500;width:160px;flex-shrink:0;}
.progress-bar-wrap{flex:1;height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 1s ease;}
.progress-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;width:56px;text-align:right;flex-shrink:0;}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);transition:all .15s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.search-input{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:var(--surface);color:var(--text);min-width:220px;}
.search-input:focus{border-color:var(--accent);}

/* ACTION BTNS */
.action-btn{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);transition:all .15s;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.danger:hover{border-color:var(--red);color:var(--red);}
.action-btn.success{background:var(--accent);color:white;border-color:var(--accent);}

/* LOADER */
.loader-wrap{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px;}

/* SECTION TITLE */
.section-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;margin-top:24px;}
.section-label:first-child{margin-top:0;}

/* SETTINGS */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:14px;font-weight:500;}
.settings-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.settings-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);}

@media(max-width:960px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.g4,.g3,.g2{grid-template-columns:1fr}.sidebar{position:fixed;height:100%;z-index:150;left:0;top:60px;}.sidebar.collapsed{width:0;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏪</div>
    <h1>Joynshop Admin</h1>
    <p>Kirish uchun parolni yozing</p>
    <input type="password" id="pwd-input" placeholder="••••••••">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Kirish</button>
    <div class="login-error" id="login-error">❌ Noto'g'ri parol</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-brand">
        <div class="logo-mark">🏪</div>
        <h1>Joynshop Admin</h1>
      </div>
    </div>
    <div class="topbar-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="refresh-btn" onclick="refreshCurrent()">↻ Yangilash</button>
      <button class="logout-btn" onclick="doLogout()">Chiqish</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy</div>
        <button class="nav-item active" onclick="goPage('overview')">
          <span class="nav-icon">📊</span> Overview
        </button>
        <button class="nav-item" onclick="goPage('orders')">
          <span class="nav-icon">🛍</span> Buyurtmalar
        </button>
        <button class="nav-item" onclick="goPage('products')">
          <span class="nav-icon">📦</span> Mahsulotlar
        </button>
        <div class="nav-divider"></div>
        <div class="nav-section">Foydalanuvchilar</div>
        <button class="nav-item" onclick="goPage('buyers')">
          <span class="nav-icon">👥</span> Xaridorlar
        </button>
        <button class="nav-item" onclick="goPage('sellers')">
          <span class="nav-icon">🏪</span> Sotuvchilar
        </button>
        <div class="nav-divider"></div>
        <div class="nav-section">Hisobot</div>
        <button class="nav-item" onclick="goPage('finance')">
          <span class="nav-icon">💰</span> Moliya
        </button>
        <button class="nav-item" onclick="goPage('channels')">
          <span class="nav-icon">📢</span> Kanallar
        </button>
        <div class="nav-divider"></div>
        <button class="nav-item" onclick="goPage('settings')">
          <span class="nav-icon">⚙️</span> Sozlamalar
        </button>
      </nav>
    </aside>

    <main class="content">
      <!-- OVERVIEW -->
      <div class="page active" id="page-overview"></div>
      <!-- ORDERS -->
      <div class="page" id="page-orders"></div>
      <!-- PRODUCTS -->
      <div class="page" id="page-products"></div>
      <!-- BUYERS -->
      <div class="page" id="page-buyers"></div>
      <!-- SELLERS -->
      <div class="page" id="page-sellers"></div>
      <!-- FINANCE -->
      <div class="page" id="page-finance"></div>
      <!-- CHANNELS -->
      <div class="page" id="page-channels"></div>
      <!-- SETTINGS -->
      <div class="page" id="page-settings"></div>
    </main>
  </div>
</div>

<script>
let pwd = '';
let statsData = null;
let currentPage = 'overview';
let sidebarOpen = true;
let gmvChart = null;

// ── HELPERS ──
function fmtMoney(n) {
  if (!n) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + ' mlrd';
  if (n >= 1e6) return (n/1e6).toFixed(1) + ' mln';
  if (n >= 1e3) return (n/1e3).toFixed(0) + ' ming';
  return n.toString();
}
function fmtFull(n) { return (n||0).toLocaleString('uz-UZ') + " so'm"; }
function fmt(n) { return (n||0).toLocaleString('uz-UZ'); }
function updateTime() {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    now.toLocaleTimeString('uz-UZ', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── AUTH ──
function doLogin() {
  pwd = document.getElementById('pwd-input').value;
  document.getElementById('login-btn').textContent = '...';
  fetch(`/api/stats?pwd=${encodeURIComponent(pwd)}`)
    .then(r => { if (!r.ok) throw new Error('wrong'); return r.json(); })
    .then(data => {
      statsData = data;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      goPage('overview');
    })
    .catch(() => {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-btn').textContent = 'Kirish';
    });
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

function doLogout() {
  pwd = '';
  statsData = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-btn').textContent = 'Kirish';
  document.getElementById('login-error').style.display = 'none';
}

// ── SIDEBAR ──
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

// ── NAVIGATION ──
function goPage(name) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => {
    if (b.textContent.trim().toLowerCase().includes(getNavLabel(name))) b.classList.add('active');
  });
  loadPage(name);
  updateTime();
}

function getNavLabel(name) {
  const map = {overview:'overview',orders:'buyurtmalar',products:'mahsulotlar',buyers:'xaridorlar',sellers:'sotuvchilar',finance:'moliya',channels:'kanallar',settings:'sozlamalar'};
  return map[name] || name;
}

function refreshCurrent() { loadPage(currentPage); updateTime(); }

function loadPage(name) {
  const fns = {
    overview: loadOverview,
    orders: () => loadOrders(1, ''),
    products: () => loadProducts(),
    buyers: () => loadBuyers(1),
    sellers: loadSellers,
    finance: loadFinance,
    channels: loadChannels,
    settings: loadSettings,
  };
  if (fns[name]) fns[name]();
}

// ── OVERVIEW ──
function loadOverview() {
  fetch(`/api/stats?pwd=${encodeURIComponent(pwd)}`)
    .then(r => r.json())
    .then(d => {
      statsData = d;
      const el = document.getElementById('page-overview');
      el.innerHTML = `
        <div class="page-header">
          <div><div class="page-title">Overview</div><div class="page-sub">Umumiy statistika</div></div>
        </div>
        <div class="section-label">Asosiy ko'rsatkichlar</div>
        <div class="cards-grid g4">
          <div class="card highlight">
            <div class="card-icon" style="background:rgba(255,255,255,.15)">💰</div>
            <div class="card-label">Jami GMV</div>
            <div class="card-value">${fmtMoney(d.finance.gmv_total)}</div>
            <div class="card-sub">${fmtFull(d.finance.gmv_total)}</div>
          </div>
          <div class="card">
            <div class="card-icon icon-green">📦</div>
            <div class="card-label">Jami buyurtmalar</div>
            <div class="card-value">${d.orders.total}</div>
            <div class="card-sub"><span class="badge badge-green">+${d.orders.today} bugun</span></div>
          </div>
          <div class="card">
            <div class="card-icon icon-blue">👥</div>
            <div class="card-label">Jami xaridorlar</div>
            <div class="card-value">${d.buyers.total}</div>
            <div class="card-sub"><span class="badge badge-blue">+${d.buyers.today} bugun</span></div>
          </div>
          <div class="card">
            <div class="card-icon icon-amber">📊</div>
            <div class="card-label">Joynshop daromadi (5%)</div>
            <div class="card-value">${fmtMoney(d.finance.commission_total)}</div>
            <div class="card-sub">${fmtFull(d.finance.commission_total)}</div>
          </div>
        </div>
        <div class="section-label" style="margin-top:20px">O'sish grafigi (14 kun)</div>
        <div class="chart-card">
          <div class="chart-header">
            <div><div class="chart-title">Kunlik GMV va buyurtmalar</div></div>
            <div style="display:flex;gap:14px;font-size:12px;color:var(--text2)">
              <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:var(--accent);border-radius:3px;display:inline-block"></span>GMV</span>
              <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:var(--amber);border-radius:3px;display:inline-block"></span>Buyurtmalar</span>
            </div>
          </div>
          <div class="chart-container"><canvas id="gmvChart"></canvas></div>
        </div>
        <div class="cards-grid g2" style="margin-top:16px">
          <div class="card">
            <div class="section-label" style="margin:0 0 12px">Moliyaviy ko'rsatkichlar</div>
            <div class="progress-row"><div class="progress-label">Bugungi GMV</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${d.finance.gmv_total?Math.min(100,d.finance.gmv_today/d.finance.gmv_total*100*20):0}%"></div></div><div class="progress-val">${fmtMoney(d.finance.gmv_today)}</div></div>
            <div class="progress-row"><div class="progress-label">Haftalik GMV</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${d.finance.gmv_total?Math.min(100,d.finance.gmv_week/d.finance.gmv_total*100*2):0}%;background:var(--amber)"></div></div><div class="progress-val">${fmtMoney(d.finance.gmv_week)}</div></div>
            <div class="progress-row"><div class="progress-label">O'rtacha chek</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:60%;background:var(--blue)"></div></div><div class="progress-val">${fmtMoney(d.finance.avg_order)}</div></div>
            <div class="progress-row"><div class="progress-label">Haftalik daromad</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${d.finance.commission_total?Math.min(100,d.finance.commission_week/d.finance.commission_total*100*2):0}%;background:#9b59b6"></div></div><div class="progress-val">${fmtMoney(d.finance.commission_week)}</div></div>
          </div>
          <div class="card">
            <div class="section-label" style="margin:0 0 12px">Konversiya</div>

          <div class="card"><div class="card-label">📢 Aktiv mahsulotlar</div><div class="card-value" style="font-size:26px">${d.products.active}</div><div class="card-sub">Jami: ${d.products.total}</div></div>

}

function renderGmvChart(chartData) {
  setTimeout(() => {
    const ctx = document.getElementById('gmvChart');
    if (!ctx) return;
    if (gmvChart) { gmvChart.destroy(); gmvChart = null; }
    gmvChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: chartData.map(d => d.date),
        datasets: [
          { label: 'GMV', data: chartData.map(d => d.gmv), backgroundColor: 'rgba(45,106,79,0.15)', borderColor: 'rgba(45,106,79,0.8)', borderWidth: 2, borderRadius: 5, yAxisID: 'y' },
          { label: 'Buyurtmalar', data: chartData.map(d => d.orders), type: 'line', borderColor: '#F4A261', backgroundColor: 'rgba(244,162,97,0.1)', borderWidth: 2.5, pointBackgroundColor: '#F4A261', pointRadius: 4, fill: true, tension: 0.4, yAxisID: 'y2' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1A1814', titleColor: '#fff', bodyColor: 'rgba(255,255,255,0.8)', padding: 10, cornerRadius: 8 } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#A09890' } },
          y: { position: 'left', grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#A09890', callback: v => fmtMoney(v) } },
          y2: { position: 'right', grid: { display: false }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#F4A261' } }
        }
      }
    });
  }, 50);
}

// ── ORDERS ──
let ordersFilter = '';
let ordersPage = 1;
function loadOrders(page = 1, status = ordersFilter) {
  ordersFilter = status;
  ordersPage = page;
  const el = document.getElementById('page-orders');
  el.innerHTML = `<div class="page-header"><div><div class="page-title">Buyurtmalar</div></div></div><div class="loader-wrap"><div class="spinner"></div></div>`;
  fetch(`/api/admin/orders?pwd=${encodeURIComponent(pwd)}&page=${page}&status=${status}`)
    .then(r => r.json())
    .then(d => {
      const statusMap = { '': 'Barchasi', pending: "To'lov kutilmoqda", confirming: 'Tekshirilmoqda', confirmed: 'Tasdiqlandi', rejected: 'Rad etildi', cancelled: 'Bekor' };
      const filters = Object.entries(statusMap).map(([k,v]) =>
        `<button class="filter-btn ${ordersFilter===k?'active':''}" onclick="loadOrders(1,'${k}')">${v}</button>`
      ).join('');
      const rows = d.orders.map(o => {
        const statusColors = { confirmed:'badge-green', confirming:'badge-amber', pending:'badge-gray', rejected:'badge-red', cancelled:'badge-gray' };
        const actions = o.status === 'confirming'
          ? `<button class="action-btn success" onclick="confirmOrder('${o.code}')">✅ Tasdiqlash</button>
             <button class="action-btn danger" onclick="rejectOrder('${o.code}')">❌ Rad</button>`
          : `<span class="badge ${statusColors[o.status]||'badge-gray'}">${o.status_icon} ${o.status_text}</span>`;
        return `<tr>
          <td><code style="font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:5px">${o.code}</code></td>
          <td><div style="font-weight:500">${o.product||'—'}</div><div style="font-size:11px;color:var(--text3)">${o.shop||''}</div></td>
          <td>${o.buyer_name||'—'}<div style="font-size:11px;color:var(--text3)">${o.buyer_id||''}</div></td>
          <td><span style="font-family:'DM Mono',monospace;font-weight:600">${fmtFull(o.amount)}</span></td>
          <td><span class="badge ${o.type==='solo'?'badge-blue':'badge-green'}">${o.type==='solo'?'👤 Yakka':'👥 Guruh'}</span></td>
          <td style="font-size:11px;color:var(--text2)">${o.created||''}</td>
          <td>${actions}</td>
        </tr>`;
      }).join('');
      const pages = Array.from({length:d.pages},(_,i)=>i+1).map(p=>
        `<button class="page-btn ${p===d.page?'active':''}" onclick="loadOrders(${p},'${ordersFilter}')">${p}</button>`
      ).join('');
      el.innerHTML = `
        <div class="page-header">
          <div><div class="page-title">Buyurtmalar</div><div class="page-sub">Jami: ${d.total} ta</div></div>
        </div>
        <div class="filters">${filters}</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Kod</th><th>Mahsulot</th><th>Xaridor</th><th>Summa</th><th>Tur</th><th>Vaqt</th><th>Amal</th></tr></thead>
            <tbody>${rows||'<tr><td colspan="7" class="empty">Buyurtma yo\'q</td></tr>'}</tbody>
          </table>
          <div class="table-footer"><span>${d.total} ta natija</span><div class="pagination">${pages}</div></div>
        </div>`;
    });
}

function confirmOrder(code) {
  if (!confirm(`#${code} buyurtmani tasdiqlaysizmi?`)) return;
  fetch(`/api/admin/order/${code}/confirm?pwd=${encodeURIComponent(pwd)}`, {method:'POST'})
    .then(r => r.json()).then(() => loadOrders(ordersPage, ordersFilter));
}
function rejectOrder(code) {
  if (!confirm(`#${code} buyurtmani rad etasizmi?`)) return;
  fetch(`/api/admin/order/${code}/reject?pwd=${encodeURIComponent(pwd)}`, {method:'POST'})
    .then(r => r.json()).then(() => loadOrders(ordersPage, ordersFilter));
}

// ── PRODUCTS ──
let productsFilter = 'all';
function loadProducts(filter = productsFilter) {
  productsFilter = filter;
  const el = document.getElementById('page-products');
  el.innerHTML = `<div class="page-header"><div><div class="page-title">Mahsulotlar</div></div></div><div class="loader-wrap"><div class="spinner"></div></div>`;
  fetch(`/api/admin/products?pwd=${encodeURIComponent(pwd)}`)
    .then(r => r.json())
    .then(all => {
      let list = all;
      if (filter === 'active') list = all.filter(p => p.status !== 'closed');
      else if (filter === 'closed') list = all.filter(p => p.status === 'closed');
      const filters = [['all','Barchasi'],['active','Aktiv'],['closed','Yopilgan']].map(([k,v]) =>
        `<button class="filter-btn ${productsFilter===k?'active':''}" onclick="loadProducts('${k}')">${v}</button>`
      ).join('');
      const rows = list.map(p => {
        const pct = Math.min(100, Math.round(p.count/p.min_group*100));
        const isActive = p.status !== 'closed';
        const actions = isActive ? `
          <button class="action-btn" onclick="extendProduct('${p.id}')">⏰ +24h</button>
          <button class="action-btn danger" onclick="closeProduct('${p.id}')">🔒 Yopish</button>` : '';
        return `<tr>
          <td><code style="font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:5px">${p.id}</code></td>
          <td>
            <div style="font-weight:500">${p.name}</div>
            <div style="font-size:11px;color:var(--text3)">${p.shop_name}</div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;min-width:80px;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:var(--accent);border-radius:99px"></div>
              </div>
              <span style="font-size:12px;color:var(--text2);white-space:nowrap">${p.count}/${p.min_group}</span>
            </div>
          </td>
          <td><span style="font-family:'DM Mono',monospace">${fmtFull(p.group_price)}</span></td>
          <td><span class="badge badge-green">-${p.grp_disc}%</span></td>
          <td style="font-size:11px;color:var(--text2)">${p.deadline||'—'}</td>
          <td><span class="badge ${isActive?'badge-green':'badge-gray'}">${isActive?'🔥 Aktiv':'✅ Yopilgan'}</span></td>
          <td style="display:flex;gap:5px;flex-wrap:wrap">${actions}</td>
        </tr>`;
      }).join('');
      el.innerHTML = `
        <div class="page-header">
          <div><div class="page-title">Mahsulotlar</div><div class="page-sub">Jami: ${all.length} ta</div></div>
        </div>
        <div class="filters">${filters}</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Mahsulot</th><th>Guruh</th><th>Narx</th><th>Chegirma</th><th>Deadline</th><th>Holat</th><th>Amal</th></tr></thead>
            <tbody>${rows||'<tr><td colspan="8" class="empty">Mahsulot yo\'q</td></tr>'}</tbody>
          </table>
        </div>`;
    });
}

function extendProduct(pid) {
  fetch(`/api/admin/product/${pid}/extend?pwd=${encodeURIComponent(pwd)}`, {method:'POST'})
    .then(r => r.json()).then(d => { if(d.ok) { alert('✅ +24 soat uzaytirildi: ' + d.deadline); loadProducts(); } });
}
function closeProduct(pid) {
  if (!confirm('Mahsulotni yopmoqchimisiz?')) return;
  fetch(`/api/admin/product/${pid}/close?pwd=${encodeURIComponent(pwd)}`, {method:'POST'})
    .then(r => r.json()).then(() => loadProducts());
}
